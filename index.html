<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buchführungstrainer Autohaus CSBWV</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="trainer-fix.css">
  </head>
  <body>
    <main class="trainer-shell">
      <header class="hero-bar">
        Buchführungstrainer Autohaus CSBWV
      </header>

      <nav class="module-switcher" aria-label="Modulauswahl">
        <button class="module-button active" data-module="standard" type="button">Grundfälle</button>
        <button class="module-button" data-module="special" type="button">Sonderfälle</button>
        <button class="module-button" data-module="discountPurchase" type="button">Skonto Einkauf</button>
        <button class="module-button" data-module="discountSale" type="button">Skonto Verkauf</button>
        <button class="module-button" data-module="marginTax" type="button">Differenzbesteuerung</button>
        <button class="module-button" data-module="exchangeParts" type="button">Tauschteile</button>
      </nav>

      <section class="trainer-panel" aria-label="Buchungstrainer">
        <section class="case-section">
          <p id="taskMeta" class="task-meta">Aufgabe 1</p>
          <h1>Der Geschäftsfall</h1>
          <p id="taskText" class="task-text"></p>
          <div id="hintBox" class="hint-box" hidden></div>
        </section>

        <section class="journal-section" aria-label="Grundbuch">
          <h2>Grundbuch</h2>
          <p class="entry-note">Beträge können ohne Tausenderpunkt und bei ,00 auch ohne Nachkommastellen eingegeben werden, zum Beispiel 43500 statt 43.500,00.</p>
          <form id="entryForm" class="booking-form">
            <div id="bookingGroups" class="booking-groups"></div>
          </form>
        </section>

        <div class="action-row">
          <button class="primary-button" id="checkButton" type="button">Kontrollieren</button>
          <button class="primary-button" id="nextButton" type="button">Neue Aufgabe</button>
          <button class="primary-button" id="solutionButton" type="button">Lösung</button>
          <button class="secondary-button" id="hintButton" type="button">Tipp</button>
        </div>

        <div id="feedback" class="feedback" aria-live="polite"></div>
      </section>

      <footer class="stats-bar" aria-live="polite">
        <strong>Statistik - aktuell:</strong>
        <span>Aufgaben: <b id="taskCount">0</b></span>
        <span>richtig: <b id="rightCount">0</b></span>
        <span>falsch: <b id="wrongCount">0</b></span>
      </footer>
    </main>

    <template id="accountInputTemplate">
      <input class="account-input" list="accountOptions" placeholder="Kontonummer oder Konto" autocomplete="off">
    </template>

    <template id="amountInputTemplate">
      <label class="money-field">
        <input class="amount-input" inputmode="decimal" placeholder="0,00">
        <span>EUR</span>
      </label>
    </template>

    <datalist id="accountOptions"></datalist>

    <script src="script.js"></script>
    <script src="trainer-fix.js"></script>
  </body>
</html>
